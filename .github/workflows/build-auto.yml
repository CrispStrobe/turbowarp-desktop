name: Build (Auto)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: npm
    # package.json has "@turbowarp/extensions": "file:../extensions" and
    # scripts/prepare-extensions.mjs imports from "../../extensions/development/builder.js"
    # — both expect the gallery to live alongside this checkout.
    - name: Clone CrispStrobe/extensions sibling
      run: git clone --depth 1 https://github.com/CrispStrobe/extensions.git "$GITHUB_WORKSPACE/../extensions"
    - name: Install extensions deps (so prepare-extensions's Builder resolves adm-zip etc.)
      working-directory: ${{ github.workspace }}/../extensions
      run: npm ci --no-audit --no-fund
    - name: Clone CrispStrobe/scratch-gui sibling
      run: git clone --depth 1 --branch develop https://github.com/CrispStrobe/scratch-gui.git "$GITHUB_WORKSPACE/../scratch-gui"
    - name: Install scratch-gui deps
      working-directory: ${{ github.workspace }}/../scratch-gui
      run: |
        npm install --ignore-scripts --include=dev --legacy-peer-deps --no-audit --no-fund
        # Stub the micro:bit firmware URL that --ignore-scripts skipped.
        mkdir -p src/generated
        printf "module.exports = '';\n" > src/generated/microbit-hex-url.cjs
    - name: Install dependencies
      run: npm ci
    - name: Prepare extensions
      # Don't need to do a full fetch, that would just cause a lot of unnecessary traffic
      run: node scripts/prepare-extensions.mjs
    - name: Compile
      run: npm run webpack:compile
    - name: Package
      run: npm run electron:package:dir
